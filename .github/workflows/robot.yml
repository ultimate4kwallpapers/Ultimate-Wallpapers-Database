name: Auto Generate Wallpaper Data

# Ye robot tab chalega jab aap in 4 folders me kuch naya upload karenge
on:
  push:
    branches:
      - main
    paths:
      - 'anime_popular/**'
      - 'anime_live/**'
      - 'other_popular/**'
      - 'other_live/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          python -m pip install --upgrade pip
          pip install Pillow requests

      - name: Run Robot (Python Script)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python update_data.py

      - name: Save data.json to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Wallpaper Robot"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Robot: Naye wallpapers add kar diye gaye hain 🚀" && git push)
          
